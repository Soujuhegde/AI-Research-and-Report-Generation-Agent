version: '3.9'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: research-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=development
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - research-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: research-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - APP_ENV=development
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - research-network

networks:
  research-network:
    driver: bridge

volumes:
  research-data:
  research-logs: