[server]
port = 8501
address = "0.0.0.0"
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 50

[theme]
primaryColor = "#4CAF50"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1e2030"
textColor = "#fafafa"
font = "sans serif"

[browser]
gatherUsageStats = false

[logger]
level = "info"