version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - APP_ENV=production
      - DEBUG=false
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      - APP_ENV=production
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'