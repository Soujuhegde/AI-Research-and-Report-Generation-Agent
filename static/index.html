<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Autonomous Research Workspace</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <header class="top-nav">
        <div class="logo">AI Autonomous Research Workspace</div>
        <button id="newResearchBtn" class="btn-primary">New Research</button>
    </header>

    <!-- Main Dashboard Layout -->
    <div class="dashboard-container">
        
        <!-- Left Column: Table of Contents -->
        <aside class="left-sidebar">
            <h3 class="sidebar-title">Table of Contents</h3>
            <ul class="toc-list" id="tocList">
            </ul>
        </aside>

        <!-- Center Column: Main Report -->
        <main class="center-content">
            <div class="report-card">
                <h1 class="report-title" id="reportTitle"></h1>
                
                <div id="reportContentArea">
                </div>
            </div>
        </main>

        <!-- Right Column: Metadata & Actions -->
        <aside class="right-sidebar">
            <div class="trust-score-container">
                <div class="trust-header">
                    <span class="trust-title">Trust Score: <span id="trustValue">0</span>% Credibility</span>
                </div>
                <div class="progress-bg">
                    <div class="progress-fill" id="trustProgress" style="width: 0%;"></div>
                </div>
            </div>

            <div class="actions-section">
                <h4 class="section-heading">Quick Action</h4>
                <div class="actions-grid">
                    <button class="action-btn" id="btnExportPDF">
                        <span class="icon">📄</span>
                        <span>Export PDF</span>
                    </button>
                    <button class="action-btn" id="btnDownloadData">
                        <span class="icon">⬇️</span>
                        <span>Download Data</span>
                    </button>
                    <button class="action-btn" id="btnShareReport">
                        <span class="icon">🔗</span>
                        <span>Share Report</span>
                    </button>
                </div>
            </div>

            <div class="citations-section">
                <h4 class="section-heading">Related Citations</h4>
                <div class="citations-list" id="citationsList">
                </div>
            </div>
        </aside>

    </div>
    
    <!-- Modal for New Research -->
    <div id="newResearchModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2>Start New Research</h2>
            <div class="form-group">
                <label>Topic</label>
                <input type="text" id="topicInput" placeholder="Enter research topic...">
            </div>
            <div class="form-group">
                <label>Instructions (Optional)</label>
                <textarea id="instructionsInput" placeholder="Specific focus areas..."></textarea>
            </div>
            <button class="btn-primary w-full" id="submitResearchBtn">Start Research Pipeline</button>
            <div id="loadingIndicator" style="display:none; margin-top:1.5rem; text-align:center;">
                <p style="margin-bottom: 0.5rem; color: #64748B; font-size: 0.95rem; font-weight: 500;">Agents are researching... Play a game while you wait!</p>
                <div id="gameContainer" class="game-container">
                    <div id="dino" class="dino"></div>
                    <div id="obstacle" class="obstacle"></div>
                </div>
                <p id="gameScore" style="margin-top: 0.5rem; font-weight: 700; color: #0F172A; font-size: 1.1rem;">Score: 0</p>
            </div>
        </div>
    </div>

    <!-- We use marked.js for parsing markdown in the JS -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
